<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Investment Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
/* KEEP YOUR EXISTING STYLE HERE (unchanged) */
</style>
</head>
<body>

<header class="site-header">
  <div class="header-left">
    <h1>My <span>Investment</span> Portfolio</h1>
    <div class="subtitle" id="last-updated">Loading live prices…</div>
  </div>
  <button class="refresh-btn" id="refresh-btn" onclick="loadPrices()">Refresh prices</button>
</header>

<div class="main">

<!-- Asset Allocation -->
<div class="section">
  <div class="section-header">
    <h2>Asset Allocation</h2>
  </div>
  <div class="table-wrap" style="padding:20px;">
    <canvas id="allocationChart" height="120"></canvas>
  </div>
</div>

<hr class="divider"><br>

<!-- KEEP REST OF YOUR HTML SECTIONS EXACTLY AS BEFORE -->
<!-- US Stocks, UAE, India, HDFC, Crypto sections unchanged -->

</div>

<script>
const WORKER_URL = 'https://portfolio-prices.karnasdk.workers.dev/';

/* KEEP ALL YOUR EXISTING JS (PRICES, FX, holdings, functions, etc.) */

/* ADD THIS FUNCTION */
function renderAllocationChart() {
  const s   = calcSection(US_STOCKS);
  const u   = calcSection(UAE_STOCKS);
  const ind = calcSection(null, true);
  const hdfc = calcHdfc();
  const c   = calcSection(CRYPTO);

  const data = {
    labels: ['US & Intl', 'UAE', 'India Funds', 'HDFC Demat', 'Crypto'],
    datasets: [{
      data: [s.cur, u.cur, ind.cur, hdfc.cur, c.cur]
    }]
  };

  const ctx = document.getElementById('allocationChart').getContext('2d');

  if (window.allocationChart) {
    window.allocationChart.destroy();
  }

  window.allocationChart = new Chart(ctx, {
    type: 'pie',
    data: data,
    options: {
      plugins: {
        legend: {
          labels: {
            color: '#ffffff'
          }
        }
      }
    }
  });
}

/* MODIFY renderAll() — add this line at the end */
function renderAll() {
  /* your existing render code */

  renderAllocationChart();
}

/* EXISTING loadPrices() */
loadPrices();
</script>
</body>
</html>
